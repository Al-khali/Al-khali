name: Generate 3D Profile

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          # PAT_1 (repo scope) so the 3D graph counts PRIVATE contributions.
          # Falls back to the ephemeral token if PAT_1 is ever removed.
          GITHUB_TOKEN: ${{ secrets.PAT_1 || secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git diff --staged --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore: update 3D profile"
          # Race-safe push: other card workflows push to main concurrently.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push retry $i…"; sleep 5
          done
          exit 1
