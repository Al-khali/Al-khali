name: Update GitHub Stats SVGs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Cards are generated IN-CI by running the self-hosted github-readme-stats fork
# (Al-khali/github-readme-stats-self) directly — no Railway dependency. The old
# Railway backend died; a dead backend used to silently keep a value-less card.
# Requires repo secret PAT_1 (a GitHub token with `repo` scope) to (a) clone the
# private fork and (b) count private contributions. If PAT_1 is missing the job
# is a safe no-op and keeps the currently committed cards.

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate cards (in-CI, no Railway)
        env:
          PAT_1: ${{ secrets.PAT_1 }}
        run: |
          set -uo pipefail

          if [ -z "${PAT_1:-}" ]; then
            echo "::warning::PAT_1 not set — skipping regeneration, keeping existing cards"
            exit 0
          fi

          # Run the engine locally.
          git clone --depth 1 \
            "https://x-access-token:${PAT_1}@github.com/Al-khali/github-readme-stats-self.git" grs
          ( cd grs && npm ci --no-audit --no-fund )
          ( cd grs && PORT=9779 node express.js ) & SRV=$!

          # Wait for the server to accept requests.
          up=0
          for _ in $(seq 1 30); do
            if curl -fsS "http://localhost:9779/api?username=al-khali" -o /dev/null; then up=1; break; fi
            sleep 1
          done
          if [ "$up" != 1 ]; then
            echo "::warning::local engine did not come up — keeping existing cards"
            kill "$SRV" 2>/dev/null || true
            exit 0
          fi

          # Fetch a card and only overwrite the committed file if it is a valid,
          # NON-empty card. Guards: fetch failure, leading whitespace (GitHub
          # treats a file not starting with <svg as a broken image), error cards,
          # a required title string, AND a required value node (a value-less card
          # — the exact failure mode that showed "zero" — is rejected).
          fetch_svg() {
            local url="$1" out="$2" title="$3" value_node="$4"
            local tmp; tmp="$(mktemp)"
            if ! curl -fsS --retry 3 --retry-delay 3 --max-time 30 "$url" -o "$tmp"; then
              echo "::warning::fetch failed for $out — keeping existing file"; rm -f "$tmp"; return 0
            fi
            perl -0777 -i -pe 's/\A\s+//' "$tmp"
            if ! head -c 5 "$tmp" | grep -q '<svg' || ! grep -q '</svg>' "$tmp" \
               || grep -qiE 'something went wrong|max(imum)? retries|bad credentials|invalid username|application not found' "$tmp"; then
              echo "::warning::not a valid SVG for $out — keeping existing file"; rm -f "$tmp"; return 0
            fi
            if [ -n "$title" ] && ! grep -qiF "$title" "$tmp"; then
              echo "::warning::title '$title' missing for $out — keeping existing file"; rm -f "$tmp"; return 0
            fi
            if [ -n "$value_node" ] && ! grep -qF "$value_node" "$tmp"; then
              echo "::warning::value node '$value_node' missing for $out — keeping existing file"; rm -f "$tmp"; return 0
            fi
            mv "$tmp" "$out"; echo "updated $out"
          }

          base="http://localhost:9779"
          fetch_svg \
            "${base}/api?username=al-khali&show_icons=true&hide_border=false&bg_color=07030f&title_color=a855f7&text_color=c084fc&border_color=3b1d6b&icon_color=6366f1&include_all_commits=true&count_private=true&rank_icon=percentile" \
            assets/stats.svg "GitHub Stats" 'data-testid="commits"'

          # count_private + a repo-scoped PAT => private repos are included.
          # The fork is patched to PAGINATE owner repos (this account has >100),
          # so languages that only live in the newer repos are counted too.
          # size_weight=1/count_weight=0 ranks by real bytes (count_weight buried
          # single-repo languages like Haskell/Elixir/OCaml). langs_count=16 +
          # compact shows the full polyglot breadth; the hide list drops build/
          # markup noise (notebooks, html/css, terraform, make, docs formats).
          fetch_svg \
            "${base}/api/top-langs/?username=al-khali&layout=compact&hide_border=false&bg_color=07030f&title_color=a855f7&text_color=c084fc&border_color=3b1d6b&langs_count=16&hide=html,css,jupyter+notebook,roff,tex,scss,hcl,cypher,makefile,dockerfile,cmake,dune&count_private=true&size_weight=1&count_weight=0" \
            assets/top-langs.svg "Most Used" 'data-testid="lang-name"'

          kill "$SRV" 2>/dev/null || true

      # Trophies: the old vercel service (github-profile-trophy.vercel.app) is
      # dead (HTTP 402 DEPLOYMENT_DISABLED). Generate them in-CI instead with a
      # Go reimplementation. Pinned to a commit SHA because it receives PAT_1.
      # PAT_1 (repo scope) lets the "Commits" trophy count PRIVATE work.
      - name: Generate trophies (in-CI)
        continue-on-error: true
        uses: soulteary/github-profile-trophy-action@cabefc1ce203b1ce4c03dae3335aa794aefbbb80  # v1.0.0
        with:
          # rank filter => only S-tier trophies are shown (curated flex).
          options: 'username=al-khali&theme=tokyonight&rank=SSS,SS,S&no-frame=true&no-bg=true&column=6&margin-w=4&margin-h=4'
          path: assets/trophies.svg
          token: ${{ secrets.PAT_1 }}

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/top-langs.svg
          if [ -f assets/trophies.svg ] && head -c 200 assets/trophies.svg | grep -q '<svg'; then
            git add assets/trophies.svg
          fi
          git diff --staged --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore: update stats + trophy SVGs [skip ci]"
          # Race-safe push: other card workflows push to main concurrently.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push retry $i…"; sleep 5
          done
          echo "::error::push failed after retries"; exit 1
