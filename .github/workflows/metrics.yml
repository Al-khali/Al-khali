name: GitHub Metrics

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Analytics dashboard: full-year isometric calendar, coding habits
      # ("when I code") and achievements. PAT_1 (repo scope) => PRIVATE
      # contributions are counted. Dark-themed to match the profile.
      - name: Generate Metrics (isocalendar + habits + achievements)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PAT_1 }}
          user: al-khali
          filename: assets/metrics.svg
          template: classic
          base: ""
          config_timezone: Europe/Paris
          config_padding: 6%, 0
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          extras_css: |
            /* dark theme to match the Lain/purple profile */
            .background { fill: #07030f !important; }
            svg { background: #07030f !important; }
            h2, .title { color: #a855f7 !important; fill: #a855f7 !important; }
            text, tspan, .field, div, span, p, td, th, li, small, .cell { color: #c084fc !important; fill: #c084fc !important; }
            .subtitle, .text-muted, .muted, time { color: #9d7cc0 !important; fill: #9d7cc0 !important; }
            a { color: #818cf8 !important; }
            hr, .separator { border-color: #2a0d60 !important; }
