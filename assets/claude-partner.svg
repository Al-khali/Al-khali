      <stop offset="0%" stop-color="#d97757" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .mono { font-family:'SF Mono','Cascadia Code','Fira Code','Courier New',monospace; }
    .sans { font-family:'Helvetica Neue',Arial,sans-serif; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes blink { 0%,90%,100%{opacity:0} 93%,97%{opacity:1} }
    @keyframes cur { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes spin { to { transform:rotate(360deg) } }
    .mascot { animation: bob 3.2s ease-in-out infinite; }
    .lid { animation: blink 5.5s ease-in-out infinite; opacity:0; }
    .cur { animation: cur 1.1s step-end infinite; }
    .spark { animation: spin 26s linear infinite; }
  </style>

