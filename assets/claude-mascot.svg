  <style>
    @keyframes walk { 0%{transform:translate(-3px,0)} 25%{transform:translate(0,-3px)} 50%{transform:translate(3px,0)} 75%{transform:translate(0,-3px)} 100%{transform:translate(-3px,0)} }
    @keyframes stepA { 0%,100%{transform:translateY(0)} 50%{transform:translateY(2.5px)} }
    @keyframes stepB { 0%,100%{transform:translateY(2.5px)} 50%{transform:translateY(0)} }
    @keyframes waveA { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2.5px)} }
    @keyframes waveB { 0%,100%{transform:translateY(-2.5px)} 50%{transform:translateY(0)} }
    @keyframes blinkBoth { 0%,89%{opacity:0} 92%,96%{opacity:1} 99%,100%{opacity:0} }
    @keyframes blinkWink { 0%,42%{opacity:0} 45%,49%{opacity:1} 52%,89%{opacity:0} 92%,96%{opacity:1} 99%,100%{opacity:0} }
    .mascot { animation: walk 1.5s ease-in-out infinite; }
    .leg-a { animation: stepA 0.75s ease-in-out infinite; }
    .leg-b { animation: stepB 0.75s ease-in-out infinite; }
    .claw-a { animation: waveA 1.9s ease-in-out infinite; }
    .claw-b { animation: waveB 1.9s ease-in-out infinite; }
    .lid-l { animation: blinkBoth 6s ease-in-out infinite; opacity:0; }
    .lid-r { animation: blinkWink 6s ease-in-out infinite; opacity:0; }
  </style>
